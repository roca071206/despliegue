
<!-- Modal Eliminar -->
<div class="modal fade" id="modalEliminarCliente{{ cliente.id }}" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">
                    <i class="fa-solid fa-trash me-2"></i>Eliminar Cliente
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form method="POST" action="{% url 'eliminar_cliente' cliente.id %}">
                {% csrf_token %}
                <div class="modal-body">
                    <p>¿Está seguro de que desea eliminar el cliente <strong>{{ cliente.nombre }}</strong>?</p>
                    <p class="text-danger"><i class="fa-solid fa-warning me-2"></i>Esta acción no se puede deshacer.</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-danger">
                        <i class="fa-solid fa-trash me-2"></i>Sí, Eliminar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
